# Reference configuration for manual entry in Net2Plan.
simulation.simTimeSeconds=3600
simulation.transitoryTimeSeconds=300
randomSeed=1
arrivalPattern=random-exponential-arrivals-and-duration
averageHoldingTimeHours=1.0
connectionSizeMode=continuous-uniform
minConnectionSizeGbps=50.0
maxConnectionSizeGbps=700.0
numSlotsPerLink=110
kWorkingPaths=3
kBackupPaths=3
maxPathSearchDepth=12
localControllerMaxLinkOccupancy=0.98
txPerNode=1400
rxPerNode=1400
existingConnectionQoTGuard=STRICT
enableFailureInjection=true
failureInjectionMode=TIME_BASED
failureLinkSelection=USER_DEFINED
failureLinkId=75
failureTime=2700
repairTime=-1
revertiveMode=true
scientificTraceEnabled=false
